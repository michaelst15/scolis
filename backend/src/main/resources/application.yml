server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mybing}
    username: ${SPRING_DATASOURCE_USERNAME:mybing}
    password: ${SPRING_DATASOURCE_PASSWORD:mybing}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me-dev-secret}
    issuer: ${JWT_ISSUER:mybing.ai}
    expiresMinutes: ${JWT_EXPIRES_MINUTES:240}
  cors:
    allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  session:
    maxIdleMinutes: ${SESSION_MAX_IDLE_MINUTES:2}
  otp:
    ttlMinutes: ${OTP_TTL_MINUTES:5}
    resendCooldownSeconds: ${OTP_RESEND_COOLDOWN_SECONDS:30}
    maxAttempts: ${OTP_MAX_ATTEMPTS:5}
