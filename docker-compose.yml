services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mybing
      POSTGRES_USER: mybing
      POSTGRES_PASSWORD: mybing
    ports:
      - "5433:5432"
    volumes:
      - mybing_pgdata:/var/lib/postgresql/data

  mail:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mybing
      SPRING_DATASOURCE_USERNAME: mybing
      SPRING_DATASOURCE_PASSWORD: mybing
      CORS_ALLOWED_ORIGINS: http://localhost:*,http://127.0.0.1:*
      JWT_SECRET: dev-secret-change-me-dev-secret-change-me-dev-secret
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mail}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-false}
      MAIL_FROM: ${MAIL_FROM:-no-reply@mybing.ai}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-MyBing.ai}
    ports:
      - "8080:8080"
    depends_on:
      - db
      - mail

volumes:
  mybing_pgdata:
